version: "3.8"

services:
  tako-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PUBLIC_BASE_URL=https://tako.com
      - PORT=8001
      - HOST=0.0.0.0
      - MCP_ENABLE_DNS_REBINDING=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
