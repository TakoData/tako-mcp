name: tako-mcp
title: Tako MCP Server
description: |
  Search, answer, and fetch data from Tako's knowledge base of 100K+ charts
  covering economics, finance, demographics, sports, markets, and weather; and
  run deep multi-step research agents.
version: 0.6.0
license: MIT
author:
  name: Tako
  email: hello@tako.com
  url: https://tako.com
repository: https://github.com/TakoData/tako-mcp
categories:
  - Data Visualization
  - Charts
  - Data Analysis
  - Knowledge Base
tags:
  - charts
  - data-visualization
  - knowledge-base
server:
  type: remote
  transport: streamable-http
  url: https://mcp.tako.com/mcp
authentication:
  type: oauth2
  description: >
    Web hosts authenticate via the server's OAuth flow. CLI/desktop hosts may
    instead pass a Tako API token (from tako.com account settings) as a Bearer
    credential — set the optional takoApiToken below.
configSchema:
  type: object
  required: []
  properties:
    takoApiToken:
      type: string
      title: Tako API Token
      description: >
        Optional. A Tako API token for the Bearer auth path used by CLI/desktop
        hosts. Sign up at tako.com and create a token in your account settings.
        Web hosts can ignore this and use OAuth instead.
tools:
  - name: tako_search
    description: Search Tako's knowledge base for charts and live data on any topic
  - name: tako_answer
    description: Get a synthesized, citation-backed answer from Tako and/or the web
  - name: tako_contents
    description: Fetch the content behind a result URL (a card's CSV or a page's text)
  - name: tako_visualize
    description: Create an embeddable chart/card from your own structured data
  - name: tako_agent
    description: Run Tako's deep research agent for complex, multi-step data questions
  - name: get_credit_balance
    description: Check the connected account's API credit balance
examples:
  - title: Search for Charts
    description: Find existing visualizations on any topic
    input: |
      {"query": "US GDP growth rate"}
  - title: Answer a Data Question
    description: Get a synthesized answer with supporting chart cards
    input: |
      {"query": "How have US mortgage rates moved over the past year?"}
links:
  homepage: https://tako.com
  documentation: https://github.com/TakoData/tako-mcp#readme
  api_reference: https://tako.com/docs/
  changelog: https://github.com/TakoData/tako-mcp/releases
