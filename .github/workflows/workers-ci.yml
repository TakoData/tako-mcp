name: workers-ci

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
  pull_request:
    paths:
      - 'workers/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: typecheck-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: workers/.nvmrc
          cache: 'npm'
          cache-dependency-path: workers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Validate wrangler.jsonc without publishing. Catches invalid
      # compatibility dates, unknown fields, or missing `main` before they
      # break a real deploy. `--dry-run` skips auth and upload; we run it
      # against both envs because they have independent `name`/`vars`
      # overrides that can drift separately.
      - name: Validate wrangler config (staging)
        run: npx wrangler deploy --dry-run --env staging

      - name: Validate wrangler config (production)
        run: npx wrangler deploy --dry-run --env production
