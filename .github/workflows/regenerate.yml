name: Regenerate from synced OpenAPI spec

on:
  pull_request:
    paths:
      - 'openapi/sdk.yaml'

permissions:
  contents: write

concurrency:
  group: regenerate-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    # Only on same-repo PRs (the auto/openapi-sync branch from the App); skip forks.
    if: github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: workers/.nvmrc
          cache: 'npm'
          cache-dependency-path: workers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Regenerate schemas + registry
        run: |
          npm run schemas:gen
          npm run registry:gen

      - name: Verify
        run: |
          npm run schemas:check
          npm run registry:check
          npm run typecheck
          npm test

      - name: Commit regenerated code
        working-directory: .
        run: |
          git config user.name "tako-bot"
          git config user.email "bot@tako.com"
          git add workers/src/generated/schemas.ts workers/src/tools/_registry.ts registry/server.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate schemas + registry from synced spec"
            git push origin HEAD:${{ github.head_ref }}
          fi
